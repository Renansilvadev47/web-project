<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */
body{
  background:#670a7e;
  font-family:'Poppins', sans-serif;
  padding:40px 20px;
  color:#1d1d1d;
}

/* IMAGEM TOPO */
.header-imagem{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.header-imagem img{
  width:180px;
  animation:flutuar 3s ease-in-out infinite;
}

@keyframes flutuar{
  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* SECTION */
section{
  max-width:950px;
  margin:auto;
  background:#fff;
  border-radius:40px;
  padding:50px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* DECORAÇÕES */
section::before{
  content:"♡";
  position:absolute;
  top:20px;
  right:30px;
  font-size:60px;
  color:#ff78ab;
  opacity:0.3;
}

section::after{
  content:"✦";
  position:absolute;
  bottom:20px;
  left:30px;
  font-size:60px;
  color:#9a68d8;
  opacity:0.2;
}

/* BOTÃO VOLTAR */
.btn-voltar{
  display:inline-block;
  text-decoration:none;
  background:#efe4fb;
  color:#7d43ba;
  padding:14px 25px;
  border-radius:40px;
  font-weight:700;
  margin-bottom:30px;
  transition:0.3s;
  border:2px solid transparent;
}

.btn-voltar:hover{
  background:#7d43ba;
  color:#fff;
  transform:translateY(-3px);
}

/* TITULOS */
h2{
  font-size:55px;
  text-align:center;
  color:#11153f;
  margin-bottom:15px;
  font-weight:800;
  line-height:1;
}

p{
  text-align:center;
  font-size:20px;
  color:#555;
  margin-bottom:40px;
  line-height:1.6;
}

/* FORM */
.form-agendamento{
  display:flex;
  flex-direction:column;
  gap:22px;
}

/* INPUTS */
.form-agendamento input[type="text"],
.form-agendamento input[type="tel"],
.form-agendamento input[type="email"],
.form-agendamento input[type="time"]{
  width:100%;
  padding:20px;
  border:none;
  border-radius:22px;
  background:#f6f3ff;
  font-size:18px;
  outline:none;
  transition:0.3s;
  border:2px solid transparent;
}

.form-agendamento input:focus{
  border-color:#9c63d8;
  background:#fff;
}

/* LABEL */
label{
  font-size:22px;
  font-weight:800;
  color:#7d43ba;
  margin-top:10px;
}

/* CARDS */
.opcoes-avaliacao{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.card-opcao{
  background:#fff7fb;
  border-radius:30px;
  padding:25px;
  cursor:pointer;
  transition:0.3s;
  border:3px solid transparent;
  position:relative;
  overflow:hidden;
}

.card-opcao:nth-child(2){
  background:#eef8ff;
}

.card-opcao:nth-child(3){
  background:#fff4e7;
}

.card-opcao:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* RADIO */
.card-opcao input{
  position:absolute;
  top:25px;
  right:25px;
  transform:scale(1.5);
  accent-color:#8b4dc4;
}

/* CONTEÚDO */
.conteudo strong{
  display:block;
  font-size:28px;
  margin-bottom:10px;
  color:#11153f;
}

.conteudo span{
  font-size:18px;
  line-height:1.6;
  color:#444;
  font-weight:500;
}

/* BOTÃO */
.btn{
  margin-top:20px;
  width:100%;
  padding:22px;
  border:none;
  border-radius:60px;
  background:linear-gradient(135deg,#8b4dc4,#ff6ba3);
  color:#fff;
  font-size:24px;
  font-weight:800;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(139,77,196,0.3);
}

.btn:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:0 15px 25px rgba(139,77,196,0.4);
}

/* RESPONSIVO */
@media(max-width:768px){

  section{
    padding:30px 25px;
  }

  h2{
    font-size:38px;
  }

  p{
    font-size:17px;
  }

  .conteudo strong{
    font-size:22px;
  }

  .conteudo span{
    font-size:16px;
  }

  .btn{
    font-size:20px;
  }

  .header-imagem img{
    width:140px;
  }

}

</style>

</head>

<body>

<!-- IMAGEM -->
<div class="header-imagem">
<img src="imagens/cerebro.png" alt="Logo Psicopedagoga">
</div>

<section>

<!-- BOTÃO VOLTAR -->
<a href="index.html" class="btn-voltar">
← Voltar para página principal
</a>

<h2>
Agendar Avaliação
</h2>

<p>
Preencha os dados abaixo e nossa equipe entrará em contato rapidamente:
</p>

<form class="form-agendamento" id="formAgendamento">

<input type="text" id="nome" placeholder="Nome completo" required>

<input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" required>

<input type="email" id="email" placeholder="E-mail (opcional)">

<input type="time" id="horario" required>

<label>
TIPO DE AVALIAÇÃO:
</label>

<div class="opcoes-avaliacao">

<label class="card-opcao">

<input type="radio" name="tipo" value="clinica" required>

<div class="conteudo">
<strong>
NA CLÍNICA:
</strong>

<span>
ATENDIMENTO NO ESPAÇO PREPARADO E ESTRUTURADO.
</span>
</div>

</label>

<label class="card-opcao">

<input type="radio" name="tipo" value="domiciliar">

<div class="conteudo">
<strong>
DOMICILIAR:
</strong>

<span>
ATENDIMENTO NO CONFORTO DA SUA CASA.
</span>
</div>

</label>

<label class="card-opcao">

<input type="radio" name="tipo" value="online">

<div class="conteudo">
<strong>
ONLINE:
</strong>

<span>
ATRAVÉS DE CHAMADA DE VIDEO.
</span>
</div>

</label>

</div>

<button class="btn" type="submit">
Solicitar Agendamento
</button>

</form>

</section>

<script>

const formulario = document.getElementById("formAgendamento");

formulario.addEventListener("submit", function(e){

  e.preventDefault();

  const nome =
  document.getElementById("nome").value;

  const telefone =
  document.getElementById("telefone").value;

  const email =
  document.getElementById("email").value;

  const horario =
  document.getElementById("horario").value;

  const tipo =
  document.querySelector(
    'input[name="tipo"]:checked'
  ).value;

  const mensagem = `Olá Patrícia, quero solicitar um agendamento.

Nome: ${nome}

Telefone: ${telefone}

Email: ${email}

Horário desejado: ${horario}

Tipo de avaliação: ${tipo}`;

  const numero =
  "555399702812";

  const url =
  `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");

  // LIMPAR FORMULÁRIO
  formulario.reset();

});

</script>

</body>
</html>
